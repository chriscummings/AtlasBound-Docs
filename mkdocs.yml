site_name: AtlasBound
site_url: https://sitename.example
theme:
  name: material
  features:
    - navigation.sections
markdown_extensions:
  - tables
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
nav:
  - index.md
  - overview.md
  - quickstart.md
  - geojson.md
  - errors-limits.md
  - API:
      - api/layers.md
      - api/geometry.md
      - api/boundary.md
      - api/health.md
      - api/webhooks.md
